services:
  sessiondeck:
    build: .
    container_name: sessiondeck
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SESSION_DECK_PORT=7890
      - SESSION_DECK_HOST=0.0.0.0
      - SESSION_DECK_LOG_LEVEL=info
      - SESSION_DECK_DB_PATH=/app/data/session-deck.db
      - SESSION_DECK_AUTH=${SESSION_DECK_AUTH:-oidc}
      - SESSION_DECK_OIDC_ISSUER=${SESSION_DECK_OIDC_ISSUER}
      - SESSION_DECK_OIDC_CLIENT_ID=${SESSION_DECK_OIDC_CLIENT_ID}
      - SESSION_DECK_OIDC_CLIENT_SECRET=${SESSION_DECK_OIDC_CLIENT_SECRET}
      - SESSION_DECK_OIDC_REDIRECT_URI=${SESSION_DECK_OIDC_REDIRECT_URI}
      - SESSION_DECK_OIDC_SCOPES=${SESSION_DECK_OIDC_SCOPES:-openid profile email}
      - SESSION_DECK_TRUSTED_NETWORKS=${SESSION_DECK_TRUSTED_NETWORKS:-}
      - SESSION_DECK_SESSION_SECRET=${SESSION_DECK_SESSION_SECRET}
      - SESSION_DECK_SESSION_MAX_AGE=${SESSION_DECK_SESSION_MAX_AGE:-86400}
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    volumes:
      # Persist SQLite database across rebuilds
      - sessiondeck-data:/app/data
      # SSH keys for connecting to tmux hosts (copied to /root/.ssh at startup with correct perms)
      - ./ssh:/ssh-mount:ro
    extra_hosts:
      # Tailscale IPs for tmux hosts
      - "reliant:100.67.247.57"
      - "hexapuma:100.98.73.28"
      - "agamemnon:100.69.201.47"
      - "manticore:100.106.252.80"
      - "cardones:100.87.195.50"
      - "minotaur:100.112.69.34"
      - "prince-adrian:100.98.60.66"
      - "trevors-star:100.109.51.23"
      - "wayfarer:100.104.109.119"
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      # deck.jesseprojects.com — public, HTTPS via Let's Encrypt
      - traefik.http.routers.sessiondeck.rule=Host(`deck.jesseprojects.com`)
      - traefik.http.routers.sessiondeck.entrypoints=websecure
      - traefik.http.routers.sessiondeck.tls.certresolver=mytlschallenge
      - traefik.http.services.sessiondeck.loadbalancer.server.port=7890

volumes:
  sessiondeck-data:

networks:
  traefik-public:
    external: true
